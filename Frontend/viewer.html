<!DOCTYPE html>
<html>
<head>
  <title>QR File Viewer</title>
</head>
<body>
  <h2>Files</h2>
  <div id="viewer"></div>

  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

<script>
async function loadFile() {
  try {
    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");

    if (!id) {
      document.getElementById("viewer").innerHTML = "Invalid QR";
      return;
    }

    const res = await fetch(`https://qr-backend-dg9e.onrender.com/api/qr/${id}`);
    const file = await res.json();

    if (!file || !file.content) {
      document.getElementById("viewer").innerHTML = "File not found";
      return;
    }

    const viewer = document.getElementById("viewer");
    viewer.innerHTML = "";

    const url = file.content;

    // 🔥 CHECK FILE TYPE
    if (file.type === "zip"){
      const zipRes = await fetch(url);
      const blob = await zipRes.blob();

      const zip = await JSZip.loadAsync(blob);

      zip.forEach(async (path, entry) => {
        const content = await entry.async("blob");
        const fileUrl = URL.createObjectURL(content);

        const link = document.createElement("a");
        link.href = fileUrl;
        link.textContent = path;
        link.target = "_blank";

        viewer.appendChild(link);
        viewer.appendChild(document.createElement("br"));
      });

    } else if (url.match(/\.(jpg|jpeg|png|gif)$/)) {
      const img = document.createElement("img");
      img.src = url;
      img.width = 300;
      viewer.appendChild(img);

    } else if (url.match(/\.(mp3|wav)$/)) {
      const audio = document.createElement("audio");
      audio.controls = true;
      audio.src = url;
      viewer.appendChild(audio);

    } else if (url.match(/\.pdf$/)) {
      const iframe = document.createElement("iframe");
      iframe.src = `https://docs.google.com/gview?url=${url}&embedded=true`;
      iframe.width = "100%";
      iframe.height = "500px";
      viewer.appendChild(iframe);
    } else {
      // fallback
      const link = document.createElement("a");
      link.href = url;
      link.textContent = "Download File";
      link.target = "_blank";
      viewer.appendChild(link);
    }

  } catch (err) {
    document.getElementById("viewer").innerHTML = "Error loading file";
    console.error(err);
  }
}

loadFile();
</script>
</body>
</html>
