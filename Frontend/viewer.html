<!DOCTYPE html>
<html>
<head>
  <title>QR File Viewer</title>
</head>
<body>
  <h2>Files</h2>
  <div id="viewer"></div>

  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

<script>
async function loadFile() {
  try {
    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");

    if (!id) {
      document.getElementById("viewer").innerHTML = "Invalid QR";
      return;
    }
    
    const res = await fetch(`https://qr-backend-dg9e.onrender.com/api/qr/${id}`);

    if (!res.ok) {
      throw new Error("File not found");
    }

    const file = await res.json();

    if (!file || !file.content) {
      document.getElementById("viewer").innerHTML = "File not found";
      return;
    }

    const zipUrl = file.content;

    const viewer = document.getElementById("viewer");
    viewer.innerHTML = "";

    if (file.type === "image") {
      // ✅ Show image directly
      const img = document.createElement("img");
      img.src = file.content;
      img.style.maxWidth = "300px";
      viewer.appendChild(img);

    } else {
      // ✅ Handle ZIP
      const zipRes = await fetch(file.content);
      const blob = await zipRes.blob();

      const zip = await JSZip.loadAsync(blob);

      zip.forEach(async (relativePath, zipEntry) => {
        const content = await zipEntry.async("blob");
        const url = URL.createObjectURL(content);

        const link = document.createElement("a");
        link.href = url;
        link.textContent = relativePath;
        link.target = "_blank";

        viewer.appendChild(link);
        viewer.appendChild(document.createElement("br"));
      });
    }

  } catch (err) {
    document.getElementById("viewer").innerHTML = "Error loading file";
    console.error(err);
  }
}

loadFile();
</script>
</body>
</html>
