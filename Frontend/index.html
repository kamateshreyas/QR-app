<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Generator</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
    <nav>
        <div id="logo">
            <h2 style="font-weight: bold;">QR Generator</h2>
        </div>
    </nav>
    <main>
        <div id="main">
            <label for="typeSelect">Choose what to upload:</label>
            <select id="typeSelect" >
                <option value="">--Select One--</option>
                <option value="text">Text</option>
                <option value="url">URL</option>
                <option value="image">Image</option>
                <option value="video">Video</option>
                <option value="audio">Audio</option>
                <option value="file">PDF</option>
            </select>
            <div id="inputContainer" style="margin-top: 15px;"></div>
            <div id="qrcode" style="margin-top:20px;"></div>
            <div style="margin-top:20px;">
                <button onclick="downloadQR()">Download QR</button>
                <button onclick="loadHistory()">Show History</button>
            </div>
        </div>
    </main>
    <footer>
        <div><code>By Shreyas Kamate</code></div>
    </footer>
    <script src="app.js"></script>
</body>
</html>
